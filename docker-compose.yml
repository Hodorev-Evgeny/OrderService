services:
  order-service:
    env_file:
      - .env
    build:
      context: .
      dockerfile: cmd/apporder/Dockerfile
    container_name: OrderServiceApp
    ports:
      - "50052:50052"
    depends_on:
      - db-service-order

  db-service-order:
    image: postgres:18.3-bookworm
    container_name: OrderDataBase
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: migrate-container
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  forwarder-port:
    image: alpine/socat:1.8.0.3
    container_name: order-service-postgres-forwarder-port
    command: "tcp-listen:5432,fork,reuseaddr tcp-connect:db-service-order:5432"
    ports:
      - "127.0.0.1:5432:5432"